<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Acceso — Pedido de piezas gráficas · UNA</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon-una.svg">
  <script>
    if (sessionStorage.getItem('una_auth') === '1') {
      window.location.replace('index.html');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Ubuntu', Arial, sans-serif;
      background: #1a1a18;
      height: 100vh;
      display: flex;
    }

    /* ── layout ── */
    .login-layout {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* ── panel gráfico ── */
    .login-graphic {
      flex: 0 0 60%;
      background: #ffffff;
      overflow: hidden;
      display: flex;
      align-items: stretch;
    }
    .login-graphic svg {
      width: 100%;
      height: 100%;
    }

    /* ── panel formulario ── */
    .login-panel {
      flex: 0 0 40%;
      min-width: 0;
      background: #1a1a18;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 48px 40px;
      position: relative;
    }
    .login-card {
      width: 100%;
      max-width: 320px;
    }
    .login-logo {
      height: 56px;
      width: auto;
      display: block;
      margin-bottom: 36px;
    }
    .login-system {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .login-title {
      font-size: 21px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 28px;
      line-height: 1.2;
    }

    /* ── formulario ── */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .login-field input {
      width: 100%;
      padding: 11px 14px;
      font-family: inherit;
      font-size: 14px;
      background: #ffffff;
      border: 2px solid transparent;
      color: #1a1a18;
      outline: none;
      border-radius: 0;
    }
    .login-field input:focus {
      border-color: #ffffff;
    }
    .login-field input::placeholder {
      color: #999;
    }
    .login-field-password {
      position: relative;
    }
    .login-field-password input {
      padding-right: 42px;
    }
    .btn-eye {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 40px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      padding: 0;
    }
    .btn-eye:hover { color: #555; }
    .btn-eye svg { display: block; }
    .btn-ingresar {
      width: 100%;
      padding: 12px;
      background: #ffffff;
      color: #1a1a18;
      border: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      letter-spacing: 0.02em;
      transition: opacity 0.15s;
      border-radius: 0;
    }
    .btn-ingresar:hover { opacity: 0.87; }
    .btn-ingresar:active { opacity: 0.75; }

    /* ── error ── */
    .login-error {
      font-size: 12px;
      color: #ff6b6b;
      margin-top: 8px;
      display: none;
    }
    .login-error.visible { display: block; }

    /* ── nota dev ── */
    .login-dev-note {
      margin-top: 28px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      line-height: 1.6;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 18px;
    }
    .login-dev-note strong {
      color: rgba(255,255,255,0.5);
      display: block;
      margin-bottom: 4px;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── pie ── */
    .login-footer {
      position: absolute;
      bottom: 22px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.02em;
    }

    /* ── mobile ── */
    @media (max-width: 640px) {
      .login-graphic { display: none; }
      .login-panel {
        width: 100%;
        padding: 48px 28px;
      }
    }
  </style>
</head>
<body>

<div class="login-layout">

  <!-- Gráfico decorativo SVG con paleta institucional UNA -->
  <div class="login-graphic">
    <svg viewBox="0 0 380 700" xmlns="http://www.w3.org/2000/svg"
         width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
      <rect width="380" height="700" fill="#ffffff"/>

      <!-- Columna 1 -->
      <!-- Arco crimson ∩ (AA · Audiovisuales) -->
      <path d="M21,162 L21,103 A59,59 0 0,0 139,103 L139,162 Z" fill="#C60751"/>
      <!-- Bowl naranja ∪ (AD · Dramáticas) -->
      <path d="M21,182 L139,182 A59,59 0 0,1 21,182 Z" fill="#F08B1D"/>
      <!-- Aro gris (FD · Formación Docente) -->
      <circle cx="80" cy="328" r="52" fill="none" stroke="#7E8082" stroke-width="17"/>
      <!-- Domo magenta ∩ (AM · Movimiento) -->
      <path d="M35,492 L35,447 A45,45 0 0,0 125,447 L125,492 Z" fill="#EC0B8D"/>
      <!-- Blob verde (AV · Visuales) -->
      <ellipse cx="80" cy="635" rx="74" ry="78" fill="#00B25A"/>

      <!-- Columna 2 -->
      <!-- Píldora azul (MS · Musicales) -->
      <rect x="161" y="22" width="118" height="195" rx="59" fill="#0093D1"/>
      <!-- Óvalo púrpura (CA · Crítica) -->
      <ellipse cx="220" cy="382" rx="58" ry="90" fill="#872175"/>
      <!-- Círculos concéntricos / blanco (Folklore → EF3E42) -->
      <circle cx="220" cy="578" r="66" fill="#EF3E42"/>
      <circle cx="220" cy="578" r="50" fill="#ffffff"/>
      <circle cx="220" cy="578" r="35" fill="#EF3E42"/>
      <circle cx="220" cy="578" r="19" fill="#ffffff"/>
      <circle cx="220" cy="578" r="7"  fill="#EF3E42"/>

      <!-- Columna 3: puntos navy (Rectorado) -->
      <circle cx="307" cy="44"  r="19" fill="#00467F"/>
      <circle cx="307" cy="103" r="19" fill="#00467F"/>
      <circle cx="307" cy="162" r="19" fill="#00467F"/>
      <circle cx="307" cy="221" r="19" fill="#00467F"/>
      <circle cx="307" cy="280" r="19" fill="#00467F"/>
      <circle cx="307" cy="339" r="19" fill="#00467F"/>
      <circle cx="307" cy="398" r="19" fill="#00467F"/>
      <circle cx="307" cy="457" r="19" fill="#00467F"/>
      <circle cx="307" cy="516" r="19" fill="#00467F"/>
      <circle cx="307" cy="575" r="19" fill="#00467F"/>
      <circle cx="307" cy="634" r="19" fill="#00467F"/>
      <circle cx="307" cy="693" r="19" fill="#00467F"/>

      <!-- Columna 3: puntos teal (MM · Multimediales) -->
      <circle cx="354" cy="73"  r="12" fill="#007C85"/>
      <circle cx="354" cy="132" r="12" fill="#007C85"/>
      <circle cx="354" cy="191" r="12" fill="#007C85"/>
      <circle cx="354" cy="250" r="12" fill="#007C85"/>
      <circle cx="354" cy="309" r="12" fill="#007C85"/>
      <circle cx="354" cy="368" r="12" fill="#007C85"/>
      <circle cx="354" cy="427" r="12" fill="#007C85"/>
      <circle cx="354" cy="486" r="12" fill="#007C85"/>
      <circle cx="354" cy="545" r="12" fill="#007C85"/>
      <circle cx="354" cy="604" r="12" fill="#007C85"/>
      <circle cx="354" cy="663" r="12" fill="#007C85"/>
    </svg>
  </div>

  <!-- Panel de acceso -->
  <div class="login-panel">
    <div class="login-card">
      <img src="assets/img/2022-una-re-logo-circular-blanco.png" alt="Logo UNA" class="login-logo">
      <p class="login-system">Pedido de piezas gráficas</p>
      <h1 class="login-title">Ingresá para continuar</h1>
      <form class="login-form" onsubmit="handleLogin(event)">
        <div class="login-field">
          <input type="text" id="usuario" placeholder="Usuario" autocomplete="username">
        </div>
        <div class="login-field login-field-password">
          <input type="password" id="contrasena" placeholder="Contraseña" autocomplete="current-password">
          <button type="button" class="btn-eye" onclick="togglePassword()" aria-label="Mostrar contraseña">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <button type="submit" class="btn-ingresar" id="btn-ingresar">Ingresar</button>
        <p class="login-error" id="login-error">Usuario o contraseña incorrectos.</p>
      </form>
      <div class="login-dev-note">
        <strong>Nota para el equipo de desarrollo</strong>
        Prototipo funcional. Credenciales validadas con SHA-256 contra credentials.json. La autenticación real debe implementarse en el servidor.
      </div>
    </div>
    <span class="login-footer">2026 · Universidad Nacional de las Artes</span>
  </div>

</div>

<script>
  function togglePassword() {
    var input = document.getElementById('contrasena');
    var icon  = document.getElementById('eye-icon');
    var showing = input.type === 'text';
    input.type = showing ? 'password' : 'text';
    icon.innerHTML = showing
      ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>'
        + '<path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>'
        + '<line x1="1" y1="1" x2="23" y2="23"/>';
  }

  async function sha256(text) {
    const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const usuario   = document.getElementById('usuario').value.trim().toLowerCase();
    const password  = document.getElementById('contrasena').value;
    const errorEl   = document.getElementById('login-error');
    const btnEl     = document.getElementById('btn-ingresar');

    errorEl.classList.remove('visible');
    btnEl.disabled = true;
    btnEl.textContent = 'Verificando…';

    try {
      const creds = await fetch('credentials.json').then(r => r.json());
      const hash  = await sha256(password);
      const match = creds.find(c => c.usuario === usuario && c.hash === hash);

      if (match) {
        sessionStorage.setItem('una_auth', '1');
        sessionStorage.setItem('una_ua', usuario);
        window.location.href = 'index.html';
      } else {
        errorEl.classList.add('visible');
        btnEl.disabled = false;
        btnEl.textContent = 'Ingresar';
      }
    } catch {
      errorEl.textContent = 'Error al cargar las credenciales.';
      errorEl.classList.add('visible');
      btnEl.disabled = false;
      btnEl.textContent = 'Ingresar';
    }
  }
</script>
</body>
</html>
